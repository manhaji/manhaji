name: CI

# Runs automatically on every Pull Request into main, and on direct pushes to main.
# These are the automated "robots" that must pass before code can merge.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    name: Lint, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        # Using `npm install` (not the stricter `npm ci`) so the correct
        # platform-specific native packages resolve on the Linux runner,
        # even though the lock file is generated on macOS.
        run: npm install --no-audit --no-fund

      - name: Lint (code style)
        run: npx turbo lint

      - name: Run tests
        run: npx turbo test

      - name: Build the portal
        # Only builds apps/portal (the deployed app) and its workspace dependencies.
        # Placeholder env vars let the build complete in CI without real secrets.
        # Real secrets live in Vercel / GitHub Secrets, never in the repo.
        run: npx turbo build --filter=@manhaj/portal
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-anon-key
          ANTHROPIC_API_KEY: placeholder-key
          SCHOOL_NAME: Demo School
          ACADEMIC_YEAR: "2026-2027"
          SESSION_SECRET: placeholder-session-secret-32-chars-min
          DEMO_PASSWORD_ADMIN: placeholder
          DEMO_PASSWORD_TEACHER: placeholder
          DEMO_PASSWORD_STUDENT: placeholder
          DEMO_PASSWORD_PARENT: placeholder
